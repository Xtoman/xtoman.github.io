# Основные настройки сайта
title: "Maxim Zinchenko"
title_ru: "Максим Зинченко"
description: "Максим Зинченко — документальный фотограф. Портфолио, фотопроекты и блог о путешествиях и технологиях."
description_en: "Maksim Zinchenko — documentary photographer. Portfolio, photo projects and blog about travel and technology."
baseurl: ""  # если сайт размещен в подкаталоге, укажите путь здесь
url: "https://xtoman.ru"  # укажите ваш домен здесь

# Настройки автора
author:
  name: "Максим Зинченко"
  name_en: "Maxim Zinchenko"
  name_alt: "Maksim Zinchenko"
  job_title: "Фотограф"
  job_title_en: "Photographer"
  alternate_names:
    - "Maxim Zinchenko"
    - "Maksim Zinchenko"
    - "Зинченко Максим"
  email: "xim395@gmail.com"
  github: "https://github.com/xtoman"
  telegram: "https://t.me/xtoman"

# Google Search Console: вставьте код верификации после регистрации сайта
# google_site_verification: "ваш-код-из-search-console"

# Настройки пагинации
paginate: 5
paginate_path: "/page/:num/"

# Настройки SEO
lang: ru
timezone: Europe/Moscow

# Настройки постов
permalink: /:year/:month/:day/:title/

# Коллекции
collections:
  photoprojects:
    output: true
    permalink: /photoprojects/:name/

# Плагины
plugins:
  - jekyll-redirect-from
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

# Исключения из сборки
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - GITHUB_SETUP.md
  - PHOTOPROJECTS_GUIDE.md
  - TESTING.md
  - TELEGRAM_SETUP.md
  - _photoprojects/README.md
  - _photoprojects/example-project.md

# Настройки сборки
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge 